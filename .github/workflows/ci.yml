name: NLP Engine CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LLVM_VERSION: 19

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test-cpp:
    name: C++ Native Build & Test (Ubuntu 24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential wget
          # Install Clang/LLVM from apt.llvm.org — distro packages lag behind
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- ${{ env.LLVM_VERSION }}
          sudo apt-get install -y clang-format-${{ env.LLVM_VERSION }}
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/cc  cc  /usr/bin/clang-${{ env.LLVM_VERSION }}   100
          sudo ln -sf /usr/bin/clang-format-${{ env.LLVM_VERSION }} /usr/bin/clang-format

      - name: Configure CMake
        run: cmake --preset ci-ubuntu

      - name: Build C++ Core
        run: cmake --build build --parallel $(nproc)

      - name: Run C++ Unit Tests
        working-directory: build
        run: |
          ./nlp_tests
          ./nlp_tests_linguistics
          ./nlp_tests_async
          ./nlp_tests_markov
          ./nlp_tests_graph
          ./nlp_tests_unicode
          ./nlp_tests_onnx_tokenizer
          ./nlp_tests_onnx_embed

      - name: Check Code Style (Clang-Format)
        run: |
          # Fails if code is not formatted according to .clang-format
          cmake --build build --target lint-check

  build-and-test-python:
    name: Python Bindings & Integration (macOS)
    runs-on: macos-latest # Using macOS to match dev environment and test cross-platform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build C++ with Python Bindings
        run: |
          mkdir build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_PYTHON_BINDINGS=ON \
            -DBUILD_TESTING=OFF
          cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Install Python Dependencies
        run: |
          cd examples/fastapi/backend
          uv pip install -r pyproject.toml --system

      - name: Verify Python Module Load
        run: |
          export PYTHONPATH=$(find build -name "nlp_engine*.so" -o -name "nlp_engine*.pyd" | xargs dirname)
          python3 -c "import nlp_engine; print('NLP Engine Version:', nlp_engine.__version__ if hasattr(nlp_engine, '__version__') else 'Loaded')"

  frontend-check:
    name: Frontend Lint & Format (Bun)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Frontend Deps
        run: |
          cd examples/fastapi/client
          bun install

      - name: Lint and Format Check
        run: |
          bun x prettier --check "**/*.{js,ts,tsx,json,md}" --ignore-path .gitignore
